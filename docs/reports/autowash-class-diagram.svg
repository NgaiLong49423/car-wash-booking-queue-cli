<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1250" viewBox="0 0 1800 1250">
  <defs>
    <style>
      .title { font: bold 34px Arial, sans-serif; fill: #12233f; }
      .package { fill: #f6f9fd; stroke: #8aa7cb; stroke-width: 2; rx: 14; }
      .packageLabel { font: bold 20px Arial, sans-serif; fill: #24517d; }
      .box { fill: #fff; stroke: #244b73; stroke-width: 2; rx: 5; }
      .head { fill: #163b62; }
      .className { font: bold 17px Arial, sans-serif; fill: #fff; text-anchor: middle; }
      .body { font: 14px 'Courier New', monospace; fill: #17283a; }
      .small { font: 12px Arial, sans-serif; fill: #304b64; }
      .assoc { stroke: #264b72; stroke-width: 2; fill: none; }
      .dep { stroke: #264b72; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .comp { stroke: #264b72; stroke-width: 2; fill: none; marker-start: url(#diamond); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#264b72"/></marker>
    <marker id="diamond" viewBox="0 0 12 12" refX="6" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M 6 0 L 12 6 L 6 12 L 0 6 z" fill="#264b72"/></marker>
  </defs>

  <text x="900" y="48" class="title" text-anchor="middle">AutoWash Priority Booking Engine — Core UML Class Diagram</text>

  <!-- packages -->
  <rect x="35" y="80" width="220" height="390" class="package"/><text x="55" y="112" class="packageLabel">app</text>
  <rect x="285" y="80" width="650" height="600" class="package"/><text x="305" y="112" class="packageLabel">service</text>
  <rect x="970" y="80" width="790" height="600" class="package"/><text x="990" y="112" class="packageLabel">model</text>
  <rect x="35" y="720" width="1060" height="420" class="package"/><text x="55" y="752" class="packageLabel">datastructure</text>
  <rect x="1130" y="720" width="630" height="420" class="package"/><text x="1150" y="752" class="packageLabel">util</text>

  <!-- Main -->
  <g transform="translate(70,180)"><rect width="150" height="105" class="box"/><rect width="150" height="34" class="head"/><text x="75" y="23" class="className">Main</text><line x1="0" y1="34" x2="150" y2="34" class="assoc"/><text x="12" y="65" class="body">+ main(args): void</text></g>

  <!-- Services -->
  <g transform="translate(320,145)"><rect width="270" height="150" class="box"/><rect width="270" height="34" class="head"/><text x="135" y="23" class="className">CustomerService</text><line x1="0" y1="34" x2="270" y2="34" class="assoc"/><text x="12" y="60" class="body">- customerList: MyLinkedList&lt;Customer&gt;</text><line x1="0" y1="78" x2="270" y2="78" class="assoc"/><text x="12" y="104" class="body">+ addCustomer(...): void</text><text x="12" y="129" class="body">+ findCustomerById(id): Customer</text></g>
  <g transform="translate(630,145)"><rect width="270" height="150" class="box"/><rect width="270" height="34" class="head"/><text x="135" y="23" class="className">VehicleService</text><line x1="0" y1="34" x2="270" y2="34" class="assoc"/><text x="12" y="60" class="body">- vehicleList: MyLinkedList&lt;Vehicle&gt;</text><line x1="0" y1="78" x2="270" y2="78" class="assoc"/><text x="12" y="104" class="body">+ addVehicle(...): void</text><text x="12" y="129" class="body">+ findVehicleByLicense(): Vehicle</text></g>
  <g transform="translate(320,375)"><rect width="270" height="150" class="box"/><rect width="270" height="34" class="head"/><text x="135" y="23" class="className">WashServiceManager</text><line x1="0" y1="34" x2="270" y2="34" class="assoc"/><text x="12" y="60" class="body">- serviceList: MyLinkedList&lt;WashPackage&gt;</text><line x1="0" y1="78" x2="270" y2="78" class="assoc"/><text x="12" y="104" class="body">+ findServiceById(id): WashPackage</text><text x="12" y="129" class="body">+ sortServicesByPrice(ascending)</text></g>
  <g transform="translate(630,375)"><rect width="270" height="150" class="box"/><rect width="270" height="34" class="head"/><text x="135" y="23" class="className">BookingService</text><line x1="0" y1="34" x2="270" y2="34" class="assoc"/><text x="12" y="60" class="body">- bookingQueue: MyQueue&lt;Booking&gt;</text><text x="12" y="85" class="body">- bookingList: MyLinkedList&lt;Booking&gt;</text><line x1="0" y1="100" x2="270" y2="100" class="assoc"/><text x="12" y="124" class="body">+ addBooking(...): void</text><text x="12" y="145" class="body">+ processNextBooking(): void</text></g>

  <!-- Models -->
  <g transform="translate(1005,135)"><rect width="225" height="175" class="box"/><rect width="225" height="34" class="head"/><text x="112" y="23" class="className">Customer</text><line x1="0" y1="34" x2="225" y2="34" class="assoc"/><text x="12" y="59" class="body">- id: String</text><text x="12" y="80" class="body">- name: String</text><text x="12" y="101" class="body">- phone: String</text><text x="12" y="122" class="body">- membershipLevel: String</text><text x="12" y="143" class="body">- points: int</text><line x1="0" y1="151" x2="225" y2="151" class="assoc"/><text x="12" y="171" class="body">+ getters/setters</text></g>
  <g transform="translate(1295,135)"><rect width="225" height="155" class="box"/><rect width="225" height="34" class="head"/><text x="112" y="23" class="className">Vehicle</text><line x1="0" y1="34" x2="225" y2="34" class="assoc"/><text x="12" y="59" class="body">- id: String</text><text x="12" y="80" class="body">- licensePlate: String</text><text x="12" y="101" class="body">- customerId: String</text><line x1="0" y1="118" x2="225" y2="118" class="assoc"/><text x="12" y="140" class="body">+ getters/setters</text></g>
  <g transform="translate(1535,135)"><rect width="190" height="175" class="box"/><rect width="190" height="34" class="head"/><text x="95" y="23" class="className">WashPackage</text><line x1="0" y1="34" x2="190" y2="34" class="assoc"/><text x="12" y="59" class="body">- id: String</text><text x="12" y="80" class="body">- name: String</text><text x="12" y="101" class="body">- price: double</text><text x="12" y="122" class="body">- duration: int</text><text x="12" y="143" class="body">- status: String</text><line x1="0" y1="151" x2="190" y2="151" class="assoc"/><text x="12" y="171" class="body">+ getters/setters</text></g>
  <g transform="translate(1005,390)"><rect width="290" height="205" class="box"/><rect width="290" height="34" class="head"/><text x="145" y="23" class="className">Booking</text><line x1="0" y1="34" x2="290" y2="34" class="assoc"/><text x="12" y="59" class="body">- bookingId, customerId: String</text><text x="12" y="80" class="body">- vehicleId, serviceId: String</text><text x="12" y="101" class="body">- date, period: String</text><text x="12" y="122" class="body">- bookingStatus: String</text><text x="12" y="143" class="body">- paymentStatus: String</text><text x="12" y="164" class="body">- createdTime: long</text><line x1="0" y1="179" x2="290" y2="179" class="assoc"/><text x="12" y="199" class="body">+ getters/setters</text></g>
  <g transform="translate(1355,390)"><rect width="180" height="130" class="box"/><rect width="180" height="34" class="head"/><text x="90" y="23" class="className">Period</text><line x1="0" y1="34" x2="180" y2="34" class="assoc"/><text x="12" y="59" class="body">- date: String</text><text x="12" y="80" class="body">- periodName: String</text><text x="12" y="101" class="body">- status: String</text><text x="12" y="121" class="body">+ isActive(): boolean</text></g>
  <g transform="translate(1575,390)"><rect width="150" height="150" class="box"/><rect width="150" height="34" class="head"/><text x="75" y="23" class="className">History</text><line x1="0" y1="34" x2="150" y2="34" class="assoc"/><text x="10" y="59" class="body">- bookingId</text><text x="10" y="80" class="body">- customerId</text><text x="10" y="101" class="body">- serviceName</text><text x="10" y="122" class="body">- amountPaid</text><text x="10" y="143" class="body">+ getters/setters</text></g>

  <!-- Data structures -->
  <g transform="translate(80,805)"><rect width="190" height="145" class="box"/><rect width="190" height="34" class="head"/><text x="95" y="23" class="className">Node&lt;T&gt;</text><line x1="0" y1="34" x2="190" y2="34" class="assoc"/><text x="12" y="61" class="body">- data: T</text><text x="12" y="84" class="body">- next: Node&lt;T&gt;</text><line x1="0" y1="97" x2="190" y2="97" class="assoc"/><text x="12" y="123" class="body">+ Node(data)</text></g>
  <g transform="translate(315,790)"><rect width="245" height="180" class="box"/><rect width="245" height="34" class="head"/><text x="122" y="23" class="className">MyLinkedList&lt;T&gt;</text><line x1="0" y1="34" x2="245" y2="34" class="assoc"/><text x="12" y="60" class="body">- head, tail: Node&lt;T&gt;</text><text x="12" y="83" class="body">- size: int</text><line x1="0" y1="96" x2="245" y2="96" class="assoc"/><text x="12" y="121" class="body">+ addLast(data): void</text><text x="12" y="144" class="body">+ get(index): T</text><text x="12" y="167" class="body">+ remove(index): T</text></g>
  <g transform="translate(610,790)"><rect width="235" height="180" class="box"/><rect width="235" height="34" class="head"/><text x="117" y="23" class="className">MyQueue&lt;T&gt;</text><line x1="0" y1="34" x2="235" y2="34" class="assoc"/><text x="12" y="60" class="body">- front, rear: Node&lt;T&gt;</text><text x="12" y="83" class="body">- size: int</text><line x1="0" y1="96" x2="235" y2="96" class="assoc"/><text x="12" y="121" class="body">+ enqueue(data): void</text><text x="12" y="144" class="body">+ dequeue(): T</text><text x="12" y="167" class="body">+ peek(): T</text></g>
  <g transform="translate(890,790)"><rect width="165" height="180" class="box"/><rect width="165" height="34" class="head"/><text x="82" y="23" class="className">MyStack&lt;T&gt;</text><line x1="0" y1="34" x2="165" y2="34" class="assoc"/><text x="12" y="60" class="body">- top: Node&lt;T&gt;</text><text x="12" y="83" class="body">- size: int</text><line x1="0" y1="96" x2="165" y2="96" class="assoc"/><text x="12" y="121" class="body">+ push(data)</text><text x="12" y="144" class="body">+ pop(): T</text><text x="12" y="167" class="body">+ peek(): T</text></g>
  <g transform="translate(80,1005)"><rect width="280" height="100" class="box"/><rect width="280" height="34" class="head"/><text x="140" y="23" class="className">MyPriorityQueue&lt;T extends Comparable&lt;T&gt;&gt;</text><line x1="0" y1="34" x2="280" y2="34" class="assoc"/><text x="12" y="60" class="body">- heap: Object[]; - size: int</text><text x="12" y="84" class="body">+ insert(data); + poll(): T; + peek(): T</text></g>
  <g transform="translate(410,1005)"><rect width="245" height="100" class="box"/><rect width="245" height="34" class="head"/><text x="122" y="23" class="className">MyMap&lt;K,V&gt;</text><line x1="0" y1="34" x2="245" y2="34" class="assoc"/><text x="12" y="60" class="body">- entries: Entry[]; - size: int</text><text x="12" y="84" class="body">+ put(key,value); + get(key): V</text></g>

  <!-- utilities -->
  <g transform="translate(1170,805)"><rect width="270" height="180" class="box"/><rect width="270" height="34" class="head"/><text x="135" y="23" class="className">FileManager</text><line x1="0" y1="34" x2="270" y2="34" class="assoc"/><text x="12" y="62" class="body">+ loadData(...): boolean</text><text x="12" y="86" class="body">+ saveData(...): void</text><text x="12" y="110" class="body">+ loadExtraData(...): void</text><text x="12" y="134" class="body">+ saveExtraData(...): void</text><text x="12" y="158" class="body">+ saveBookings(...): void</text></g>
  <g transform="translate(1490,805)"><rect width="210" height="120" class="box"/><rect width="210" height="34" class="head"/><text x="105" y="23" class="className">DataSeeder</text><line x1="0" y1="34" x2="210" y2="34" class="assoc"/><text x="12" y="63" class="body">+ seed(customerService,</text><text x="12" y="84" class="body">  washService, vehicleService)</text></g>

  <!-- service dependencies from Main -->
  <path d="M220 205 H275 V190 H320" class="dep"/><path d="M220 225 H265 V220 H630" class="dep"/><path d="M220 245 H275 V430 H320" class="dep"/><path d="M220 265 H265 V450 H630" class="dep"/><path d="M145 285 V1060 H1170" class="dep"/>
  <!-- service model associations -->
  <path d="M590 190 H1005" class="assoc"/><path d="M900 190 H1295" class="assoc"/><path d="M590 430 H1535" class="assoc"/><path d="M900 450 H1005" class="assoc"/>
  <!-- domain multiplicity -->
  <path d="M1230 220 H1295" class="assoc"/><text x="1240" y="210" class="small">1</text><text x="1270" y="210" class="small">0..*</text>
  <path d="M1117 310 V390" class="assoc"/><text x="1125" y="343" class="small">1</text><text x="1125" y="380" class="small">0..*</text>
  <path d="M1407 290 V390" class="assoc"/><text x="1415" y="333" class="small">1</text><text x="1415" y="380" class="small">0..*</text>
  <path d="M1630 310 V390 H1295" class="assoc"/><text x="1617" y="375" class="small">1</text><text x="1310" y="380" class="small">0..*</text>
  <!-- compositions with data structures -->
  <path d="M455 525 V745 H437 V790" class="comp"/><path d="M765 525 V745 H727 V790" class="comp"/>
  <path d="M437 970 V995 H175 V950" class="comp"/><path d="M727 970 V995 H175 V950" class="comp"/><path d="M972 970 V995 H175 V950" class="comp"/>
  <!-- FileManager dependencies -->
  <path d="M1170 850 H1110 V610 H1120" class="dep"/><path d="M1170 870 H1090 V330 H1117" class="dep"/><path d="M1170 890 H1080 V310 H1630" class="dep"/><path d="M1170 910 H1065 V595 H1295" class="dep"/><path d="M1490 865 H1440" class="dep"/>

  <!-- legend -->
  <g transform="translate(1180,1030)"><rect width="500" height="75" rx="8" fill="#fff" stroke="#8aa7cb" stroke-width="1.5"/><text x="15" y="24" class="small">Legend:</text><line x1="80" y1="19" x2="135" y2="19" class="assoc"/><text x="145" y="24" class="small">association</text><line x1="255" y1="19" x2="310" y2="19" class="dep"/><text x="320" y="24" class="small">dependency</text><line x1="80" y1="53" x2="135" y2="53" class="comp"/><text x="145" y="58" class="small">composition</text><text x="290" y="58" class="small">Multiplicity: 1, 0..*</text></g>
</svg>
