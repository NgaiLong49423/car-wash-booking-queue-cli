name: Task
description: Ghi nhận công việc kỹ thuật, tài liệu hoặc việc cần xử lý
title: "task: "
labels: ["📋 Task"]
body:
  - type: textarea
    id: source_trace
    attributes:
      label: "0. Source Trace"
      description: "Ghi nguồn công việc nếu có. Ví dụ: SRS FR-xx, UC-xx, PRD section, issue liên quan hoặc quyết định kỹ thuật. Nếu không có, ghi 'Không có'."
      placeholder: |
        - PRD: ...
        - SRS: FR-xx — ...
        - Related issue/PR: #...
    validations:
      required: false

  - type: input
    id: task_name
    attributes:
      label: "1. Tên công việc"
      description: "Ghi tên công việc cần thực hiện. Title của issue nên viết tiếng Anh chuyên nghiệp, còn mô tả có thể viết tiếng Việt."
      placeholder: "Ví dụ: Set Up Project Folder Structure, Write README, Draw ERD..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "2. Mô tả công việc"
      description: "Mô tả rõ công việc này cần làm gì. Task là một công việc cần làm trong dự án, ví dụ setup cấu trúc thư mục, viết README, vẽ ERD, tạo database script."
      placeholder: "Mô tả chi tiết công việc..."
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: "3. Lý do cần làm"
      description: "Giải thích vì sao công việc này cần thiết cho dự án."
      placeholder: "Lý do..."
    validations:
      required: true

  - type: checkboxes
    id: task_type
    attributes:
      label: "4. Loại công việc"
      description: "Chọn loại công việc phù hợp."
      options:
        - label: "Setup dự án"
        - label: "Tài liệu (Document)"
        - label: "Database (Cơ sở dữ liệu)"
        - label: "Refactor code (Tối ưu cấu trúc code)"
        - label: "Thiết kế giao diện (UI/UX)"
        - label: "Kiểm thử (Testing)"
        - label: "Nghiên cứu (Research)"
        - label: "Dọn dẹp repo"
        - label: "Khác"

  - type: textarea
    id: scope
    attributes:
      label: "5. Phạm vi"
      description: "Liệt kê những việc nằm trong phạm vi task này."
      placeholder: |
        - ...
        - ...
    validations:
      required: false

  - type: textarea
    id: non_goals
    attributes:
      label: "6. Không nằm trong phạm vi"
      description: "Ghi rõ những việc không làm trong task này để tránh mở rộng scope. Non-goals là các mục tiêu không thực hiện."
      placeholder: |
        - Không triển khai ...
        - Không sửa ...
    validations:
      required: false

  - type: textarea
    id: checklist
    attributes:
      label: "7. Các việc cần hoàn thành (Checklist)"
      description: "Liệt kê checklist các công việc cụ thể."
      placeholder: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: files_related
    attributes:
      label: "8. File hoặc thư mục liên quan"
      description: "Ghi các file hoặc thư mục có liên quan."
      placeholder: |
        Ví dụ:
        - README.md
        - docs/
        - database/schema.sql
        - App/
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "9. Acceptance Criteria / Tiêu chí chấp nhận"
      description: "Ghi các điều kiện pass/fail để biết task này đã hoàn thành đúng. Acceptance Criteria là tiêu chí chấp nhận."
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: project_metadata
    attributes:
      label: "10. Project Metadata"
      description: "Thông tin dùng để cập nhật GitHub Project fields. Size là kích thước phạm vi việc; Story Points là điểm ước lượng nỗ lực; Priority Reason là lý do chọn độ ưu tiên."
      value: |
        - Type: 📋 Task
        - Size:
        - Story Points:
        - Priority:
        - Priority Reason:
        - Start Date: TBD
        - Target Date: TBD
    validations:
      required: true

  - type: textarea
    id: relationships
    attributes:
      label: "11. Relationships"
      description: "Quan hệ với issue khác trong GitHub Project nếu có."
      value: |
        - Parent:
        - Blocked by:
        - Blocking:
        - Security alert: None
    validations:
      required: false

  - type: input
    id: suggested_branch
    attributes:
      label: "12. Suggested Branch"
      description: "Tên nhánh gợi ý theo format type/kebab-case-title. Kebab-case là viết thường và nối từ bằng dấu gạch ngang."
      placeholder: "task/setup-project-structure"
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "13. Mức độ ưu tiên"
      description: "Chọn mức độ ưu tiên phù hợp cho công việc. Nếu chọn priority, hãy giải thích lý do trong Project Metadata."
      options:
        - "Thấp (Low)"
        - "Trung bình (Medium)"
        - "Cao (High)"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: "14. Ghi chú thêm"
      description: "Ghi thêm thông tin khác nếu cần."
      placeholder: "Nhập ghi chú thêm..."
    validations:
      required: false
